name: Integration 4 Autograder
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: amman_market
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Load schema and seed data
        run: |
          psql -h localhost -U postgres -d amman_market -f schema.sql
          psql -h localhost -U postgres -d amman_market -f seed_data.sql
        env:
          PGPASSWORD: postgres
      - name: Run autograder tests
        run: pytest tests/ -v
        env:
          PGPASSWORD: postgres
